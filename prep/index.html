<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup Tracker</title>
<style>
  :root{
    --bg:#0b1020; --panel:#141b30; --panel2:#1b2440; --line:#283255;
    --txt:#eaf0ff; --muted:#93a0c4; --accent:#34d399; --accent2:#60a5fa;
    --gold:#fbbf24; --win:#34d399; --draw:#fbbf24; --loss:#fb7185;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#1a2547 0%,var(--bg) 55%);color:var(--txt);min-height:100vh}
  header{padding:28px 22px 10px;text-align:center}
  h1{margin:0;font-size:30px;letter-spacing:.3px}
  .sub{color:var(--muted);margin-top:6px;font-size:14px}
  .hosts{display:inline-flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
  .pill{background:var(--panel2);border:1px solid var(--line);padding:5px 12px;border-radius:999px;font-size:12px;color:var(--muted)}
  .pill b{color:var(--txt)}
  nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:18px auto;max-width:760px;padding:0 12px}
  nav button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:9px 16px;border-radius:10px;
    font-size:14px;cursor:pointer;transition:.15s}
  nav button:hover{color:var(--txt);border-color:var(--accent2)}
  nav button.active{background:linear-gradient(180deg,var(--accent2),#3b82f6);color:#fff;border-color:transparent;font-weight:600}
  main{max-width:1100px;margin:0 auto;padding:6px 16px 60px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .card h3{margin:0;padding:12px 14px;background:var(--panel2);border-bottom:1px solid var(--line);font-size:15px;
    display:flex;align-items:center;gap:8px}
  .gtag{background:var(--accent2);color:#06122e;font-weight:700;border-radius:6px;padding:2px 8px;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:8px 10px;text-align:center}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td.team{text-align:left;font-weight:600}
  tbody tr{border-top:1px solid var(--line)}
  tr.qual td.pos{color:var(--accent);font-weight:800}
  tr.qual{background:rgba(52,211,153,.06)}
  .pos{width:22px;color:var(--muted);font-weight:700}
  .pts{font-weight:800;color:var(--txt)}
  .legend{color:var(--muted);font-size:12px;text-align:center;margin:14px 0 0}
  .legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent);margin-right:5px;vertical-align:middle}
  /* matches */
  .mday{margin:0;padding:9px 14px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);
    background:var(--panel2);border-top:1px solid var(--line)}
  .match{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--line);font-size:13px}
  .match .t{flex:1}
  .match .t.h{text-align:right}
  .score{font-weight:800;min-width:54px;text-align:center;background:var(--panel2);border-radius:7px;padding:3px 0;margin:0 8px}
  .score.tbd{color:var(--muted);font-weight:600;background:transparent;border:1px dashed var(--line)}
  .win{color:var(--win)} .los{color:var(--muted)}
  /* venues */
  .vrow{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-top:1px solid var(--line);gap:12px}
  .vrow:first-child{border-top:none}
  .vcity{font-weight:700} .vstad{color:var(--muted);font-size:12px;margin-top:2px}
  .vcap{color:var(--accent2);font-weight:700;font-size:13px;white-space:nowrap}
  .flag{font-size:11px;color:var(--muted)}
  /* calendar */
  .cal-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .cal-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .cal-top h3{margin:0;font-size:15px}
  .cal-clear{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:5px 12px;border-radius:8px;
    font-size:12px;cursor:pointer}
  .cal-clear:hover{color:var(--txt);border-color:var(--accent2)}
  /* labels and day grid share the exact same column template + gap + centering,
     so columns line up and the track stays centered. minmax(0,30px) lets cells
     shrink to fit narrow widths and caps them at a tidy 30px on wide screens. */
  .cal-mlabels{display:grid;grid-template-columns:repeat(39,minmax(0,30px));gap:5px;justify-content:center;width:100%;margin-bottom:7px}
  .cal-mlabels span{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(39,minmax(0,30px));gap:5px;justify-content:center;width:100%}
  .day{width:100%;aspect-ratio:1/1;border-radius:6px;background:#1a2238;border:1px solid #232d4d;cursor:default;
    display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1;color:#6f7da6;transition:transform .08s}
  .day .dn{pointer-events:none}
  .day.grp,.day.dko{cursor:pointer}
  .day.grp:hover,.day.dko:hover{transform:translateY(-2px)}
  .day.l1{background:#1f5c46} .day.l2{background:#2a9d6f} .day.l3{background:#34d399}
  .day.l1 .dn{color:#bfe9d8} .day.l2 .dn,.day.l3 .dn{color:#06281c}
  .day.dko{background:#2b4a86} .day.dko.kp{background:#60a5fa}
  .day.dko .dn{color:#dbe8ff} .day.dko.kp .dn{color:#06122e}
  .day.sel{box-shadow:inset 0 0 0 2px #fff}
  .day.today{box-shadow:inset 0 0 0 2px var(--gold)}
  .day.today.sel{box-shadow:inset 0 0 0 2px #fff}
  .cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--muted);align-items:center}
  .cal-legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-2px}
  #cal-tip{position:fixed;pointer-events:none;z-index:50;background:#000a;border:1px solid var(--line);
    color:var(--txt);font-size:12px;padding:6px 9px;border-radius:7px;opacity:0;transition:opacity .1s;max-width:220px}
  .filter-tag{text-align:center;color:var(--accent2);font-size:13px;margin:0 0 14px}
  /* bracket */
  .bracket{display:flex;gap:0;overflow-x:auto;padding:6px 2px 20px;align-items:stretch;min-height:700px}
  .bround{display:flex;flex-direction:column;min-width:158px;flex:0 0 auto;padding:0 8px}
  .bround-h{text-align:center;margin-bottom:8px}
  .bround-h b{font-size:13px;color:var(--accent2)}
  .bround-h span{display:block;color:var(--muted);font-size:10px;margin-top:2px}
  .bround-body{flex:1;display:flex;flex-direction:column;justify-content:space-around}
  .bround.r-final .bround-body{justify-content:center}
  .ko{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-size:12px;position:relative}
  .ko+.ko{margin-top:8px}
  .ko .slot{display:flex;justify-content:space-between;color:var(--muted)}
  .ko .slot+.slot{margin-top:5px;padding-top:5px;border-top:1px dashed var(--line)}
  /* connector stub to next round */
  .bround:not(.r-final) .ko::after{content:"";position:absolute;right:-8px;top:50%;width:8px;height:1px;background:var(--line)}
  .champ{background:linear-gradient(180deg,rgba(251,191,36,.14),var(--panel));border:1px solid var(--gold);
    border-radius:10px;padding:10px;text-align:center;margin-bottom:10px}
  .champ h5{margin:0 0 4px;color:var(--gold);font-size:13px}
  .champ .who{color:var(--muted);font-size:12px}
  .ko.final{border-color:var(--gold);background:linear-gradient(180deg,rgba(251,191,36,.12),var(--panel))}
  .note{color:var(--muted);font-size:13px;text-align:center;max-width:680px;margin:4px auto 18px;line-height:1.5}
  .sech{font-size:18px;margin:6px 0 16px;text-align:center}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:0 16px 40px}
</style>
</head>

// Prefer reading the external data file (single source of truth); fall back to embedded copy.
async function loadData(){

    if(r.ok) return await r.json();
  }catch(e){}
  return EMBED;
}

const fmt = d => new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fmtLong = d => new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const played = m => m.hs!==null && m.as!==null;
const iso = dt => dt.toISOString().slice(0,10);
function eachDay(start,end){
  const out=[],d=new Date(start+'T00:00:00'),e=new Date(end+'T00:00:00');
  while(d<=e){out.push(iso(d));d.setDate(d.getDate()+1);}
  return out;
}
function expandDates(s){
  if(s.includes(' to ')){const [a,b]=s.split(' to ');return eachDay(a,b);}
  return [s];
}

function standings(g){
  const t = {}; g.teams.forEach(n=>t[n]={team:n,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  g.matches.forEach(m=>{
    if(!played(m))return;
    const h=t[m.home],a=t[m.away];
    h.mp++;a.mp++;h.gf+=m.hs;h.ga+=m.as;a.gf+=m.as;a.ga+=m.hs;
    if(m.hs>m.as){h.w++;h.pts+=3;a.l++;}
    else if(m.hs<m.as){a.w++;a.pts+=3;h.l++;}
    else{h.d++;a.d++;h.pts++;a.pts++;}
  });
  return Object.values(t).sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf||x.team.localeCompare(y.team));
}

    const rows = standings(g).map((r,i)=>`
      <tr class="${i<2?'qual':''}">
        <td class="pos">${i+1}</td>
        <td class="team">${r.team}</td>
        <td>${r.mp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gf}:${r.ga}</td><td>${(r.gf-r.ga>0?'+':'')+(r.gf-r.ga)}</td>
        <td class="pts">${r.pts}</td>
      </tr>`).join('');
    h+=`<div class="card"><h3><span class="gtag">Group ${k}</span></h3>
      <table><thead><tr><th></th><th style="text-align:left">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>G</th><th>GD</th><th>Pts</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }
  h+='</div><p class="legend"><span class="dot"></span>Green = currently in a top-2 qualifying spot</p>';
  document.getElementById('groups').innerHTML=h;
}

    <span class="t h ${hw?'win':done?'los':''}">${m.home}</span>
    <span class="score ${done?'':'tbd'}">${done?m.hs+'–'+m.as:'vs'}</span>
    <span class="t ${aw?'win':done?'los':''}">${m.away}</span>
  </div>`;
}
